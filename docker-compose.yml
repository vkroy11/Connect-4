version: '3.8'

services:
  backend:
    build:
      context: ./Backend/connect-four/server
      dockerfile: Dockerfile
    environment:
      - PORT=3001
      - CORS_ORIGIN=http://localhost
      - NODE_ENV=production
    expose:
      - "3001"
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend/connect-four
      dockerfile: Dockerfile
      args:
        - VITE_SOCKET_URL=http://localhost
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
